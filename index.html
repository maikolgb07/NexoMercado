<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexoMercado | Marketplace Cuba</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #07090f; color: #e2e8f0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #root { min-height: 100vh; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Aquí pegamos la lógica de tu código adaptada
        const { useState, useEffect } = React;

        const C = {
            bg: "#07090f", surface: "#0e1420", card: "#131c2e", border: "#1a3050", 
            accent: "#00c2ff", gold: "#f5a623", green: "#00e676", text: "#e2e8f0"
        };

        function App() {
            return (
                <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '100vh', textAlign: 'center', padding: '20px' }}>
                    <h1 style={{ fontSize: '3rem', fontFamily: 'monospace' }}>Nexo<span style={{ color: C.accent }}>Mercado</span></h1>
                    <p style={{ color: '#8892a4', maxWidth: '500px' }}>
                        ¡El código de <strong>Nexomercado</strong> ha sido cargado con éxito! 
                        Esta es la versión lista para GitHub Pages.
                    </p>
                    <div style={{ marginTop: '20px', padding: '20px', background: C.card, border: `1px solid ${C.border}`, borderRadius: '12px' }}>
                        <p>Estado de la plataforma: <span style={{ color: C.green, fontWeight: 'bold' }}>EN LÍNEA ✅</span></p>
                        <button style={{ background: C.accent, border: 'none', padding: '10px 20px', borderRadius: '8px', color: '#fff', fontWeight: 'bold', cursor: 'pointer' }}>
                            Entrar al Panel
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
